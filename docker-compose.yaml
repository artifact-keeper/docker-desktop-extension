services:
  # ---------------------------------------------------------------------------
  # Core services (always running)
  #
  # Only `web` is exposed to the host (port 3000) — the extension UI iframes it.
  # Everything else (postgres, backend, meilisearch) is internal-only.
  # `extension-service` runs the Go helper that serves the Docker Desktop socket.
  # ---------------------------------------------------------------------------
  extension-service:
    image: artifactkeeper/docker-desktop:latest
    restart: unless-stopped
    volumes:
      - /run/guest-services/artifactkeeper_docker-desktop:/run/guest-services
      - ak-ext-config:/data/config
      - ak-ext-artifacts:/data/storage
      - ak-ext-backups:/data/backups
      - ak-ext-plugins:/data/plugins
      - ak-ext-scan-workspace:/data/scan-workspace
    networks:
      - ak-ext
    deploy:
      resources:
        limits:
          memory: 64m

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    stop_grace_period: 5s
    environment:
      POSTGRES_DB: artifact_keeper
      POSTGRES_USER: artifact_keeper
      POSTGRES_PASSWORD: artifact_keeper
    volumes:
      - ak-ext-postgres:/var/lib/postgresql/data
    networks:
      - ak-ext
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artifact_keeper -d artifact_keeper"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512m

  backend:
    image: artifactkeeper/backend:1.1.7
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      extension-service:
        condition: service_started
    expose:
      - "${PORT:-8080}"
    # The extension-service generates a random admin password into
    # /data/config/admin_password on first boot. Wait for that file, export it
    # as ADMIN_PASSWORD, then launch the backend.
    entrypoint:
      - sh
      - -c
      - >
        while [ ! -s /data/config/admin_password ]; do sleep 1; done;
        export ADMIN_PASSWORD="$(cat /data/config/admin_password)";
        exec /usr/local/bin/artifact-keeper
    environment:
      DATABASE_URL: postgresql://artifact_keeper:artifact_keeper@postgres:5432/artifact_keeper
      STORAGE_BACKEND: filesystem
      STORAGE_PATH: /data/storage
      BACKUP_PATH: /data/backups
      PLUGINS_DIR: /data/plugins
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY:-artifact-keeper-ext-key}
      JWT_SECRET: ${JWT_SECRET:-artifact-keeper-ext-jwt-secret-do-not-use-in-prod}
      BIND_ADDRESS: 0.0.0.0:${PORT:-8080}
      HOST: 0.0.0.0
      PORT: ${PORT:-8080}
      ENVIRONMENT: development
      RUST_LOG: info
      SKIP_ADMIN_PROVISIONING: "false"
      ALLOW_LOCAL_ADMIN_LOGIN: "true"
      CORS_ORIGINS: "*"
      SCAN_WORKSPACE_PATH: /data/scan-workspace
    volumes:
      - ak-ext-config:/data/config:ro
      - ak-ext-artifacts:/data/storage
      - ak-ext-backups:/data/backups
      - ak-ext-plugins:/data/plugins
      - ak-ext-scan-workspace:/data/scan-workspace
    networks:
      - ak-ext
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:${PORT:-8080}/health | grep -qE '200|503' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2g

  web:
    image: artifactkeeper/web:1.1.3
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:${PORT:-8080}
    networks:
      - ak-ext
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512m

  meilisearch:
    image: getmeili/meilisearch:v1.12
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:-artifact-keeper-ext-key}
      MEILI_ENV: development
    volumes:
      - ak-ext-meilisearch:/meili_data
    networks:
      - ak-ext
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7700/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512m

  # ---------------------------------------------------------------------------
  # Scanning profile: vulnerability scanning services
  # ---------------------------------------------------------------------------
  trivy:
    image: aquasec/trivy:0.69.3
    restart: unless-stopped
    profiles:
      - scanning
    command: ["server", "--listen", "0.0.0.0:8090"]
    networks:
      - ak-ext
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8090/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  openscap:
    image: artifactkeeper/openscap:latest
    restart: unless-stopped
    profiles:
      - scanning
    networks:
      - ak-ext
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8091/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  # ---------------------------------------------------------------------------
  # SBOM profile: software bill of materials analysis
  # ---------------------------------------------------------------------------
  dependency-track:
    image: dependencytrack/apiserver:4.11.4
    restart: unless-stopped
    profiles:
      - sbom
    volumes:
      - ak-ext-dtrack:/data
    networks:
      - ak-ext
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/version || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "2.0"

  # ---------------------------------------------------------------------------
  # Tracing profile: distributed tracing
  # ---------------------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:1.62
    restart: unless-stopped
    profiles:
      - tracing
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - ak-ext
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:14269/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m

volumes:
  ak-ext-config:
  ak-ext-postgres:
  ak-ext-artifacts:
  ak-ext-meilisearch:
  ak-ext-backups:
  ak-ext-plugins:
  ak-ext-scan-workspace:
  ak-ext-dtrack:

networks:
  ak-ext:
    driver: bridge
